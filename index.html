<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Merch Ops · Daily Update</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* === OUTER PAGE — dark background like the PPM scorecard === */
  :root {
    --outer-bg: #0e1117;
    --frame-bg: #1a1d24;
    --frame-border: #2a2d35;
    --brand-blue: #1493ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--outer-bg); font-family: 'DM Sans', -apple-system, sans-serif; overflow-x: hidden; }

  /* Desktop: center a phone frame */
  .page-wrapper {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* Page header above phone */
  .page-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .page-header h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .page-header p {
    font-size: 14px;
    color: #666;
  }
  .page-header .badge {
    display: inline-block;
    background: var(--brand-blue);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  /* Phone frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    background: var(--frame-bg);
    border: 2px solid var(--frame-border);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
  }
  .phone-frame::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 28px;
    background: var(--frame-bg);
    border-radius: 0 0 18px 18px;
    z-index: 200;
  }

  /* On mobile, go full-bleed — no frame */
  @media (max-width: 480px) {
    .page-wrapper { padding: 0; justify-content: flex-start; }
    .page-header { display: none; }
    .phone-frame {
      width: 100%; height: 100vh;
      border: none; border-radius: 0;
      box-shadow: none;
    }
    .phone-frame::before { display: none; }
  }

  /* === INNER APP STYLES === */
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
  @keyframes contentFade { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }

  .shell { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; overflow: hidden; background: #FAFAF7; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 6px; font-size: 13px; font-weight: 600; color: #333; flex-shrink: 0; }
  .batt { width: 22px; height: 12px; border: 1.5px solid #333; border-radius: 3px; position: relative; padding: 1px; display: inline-flex; }
  .batt-fill { width: 75%; height: 100%; background: #333; border-radius: 1.5px; }

  .hdr { padding: 12px 20px 18px; flex-shrink: 0; }
  .hdr-greet { font-size: 14px; color: #999; margin-bottom: 2px; }
  .hdr-title { font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .hdr-sub { font-size: 12px; color: #bbb; margin-top: 2px; }

  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px 120px; }
  .content > div { animation: contentFade 0.3s ease; }

  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat { border-radius: 16px; padding: 16px 12px; text-align: center; }
  .stat-n { font-size: 28px; font-weight: 700; font-family: 'Outfit', sans-serif; }
  .stat-l { font-size: 11px; font-weight: 500; letter-spacing: 0.5px; margin-top: 2px; }

  .sec-label { font-size: 13px; font-weight: 600; color: #999; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

  .cal-item { display: flex; align-items: center; gap: 12px; padding: 13px 14px; margin-bottom: 6px; background: #fff; border-radius: 14px; border: 1px solid #f0eeea; cursor: pointer; transition: transform 0.12s; }
  .cal-item:active { transform: scale(0.98); }
  .cal-time { min-width: 48px; font-size: 13px; font-weight: 700; font-family: 'Outfit', sans-serif; color: #2D5A27; }
  .cal-title { flex: 1; font-size: 13px; font-weight: 500; }
  .tag { font-size: 9px; font-weight: 600; letter-spacing: 0.5px; padding: 3px 7px; border-radius: 6px; white-space: nowrap; }
  .chevron { color: #ccc; font-size: 16px; margin-left: 2px; }

  .action-card { display: flex; align-items: center; gap: 12px; padding: 14px; margin-bottom: 8px; background: #fff; border-radius: 14px; border: 1px solid #f0eeea; cursor: pointer; transition: transform 0.12s; }
  .action-card:active { transform: scale(0.98); }
  .action-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .action-body { flex: 1; }
  .action-title { font-size: 13px; font-weight: 600; }
  .action-sub { font-size: 11px; font-weight: 500; margin-top: 2px; }

  .team-card { display: flex; align-items: center; gap: 12px; padding: 14px; margin-bottom: 8px; background: #fff; border-radius: 14px; border: 1px solid #f0eeea; cursor: pointer; transition: transform 0.12s; }
  .team-card:active { transform: scale(0.98); }
  .team-avi { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #E8F3E6, #EBF2FC); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .team-name { font-size: 13px; font-weight: 600; }
  .team-sum { font-size: 11px; color: #888; margin-top: 2px; line-height: 1.4; }

  .alert-card { display: flex; align-items: center; gap: 12px; padding: 14px; margin-bottom: 8px; background: #FFFBF5; border-radius: 14px; border: 1px solid #F5E6D3; cursor: pointer; transition: transform 0.12s; }
  .alert-card:active { transform: scale(0.98); }
  .alert-emoji { font-size: 22px; flex-shrink: 0; }
  .alert-title { font-size: 13px; font-weight: 600; flex: 1; }

  .win-card { padding: 16px 14px; margin-bottom: 10px; background: linear-gradient(135deg, #f4fbf4, #fcfcfa); border-radius: 14px; border: 1px solid #d4edcf; cursor: pointer; transition: transform 0.12s; }
  .win-card:active { transform: scale(0.98); }
  .win-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .win-emoji { font-size: 22px; }
  .win-name { font-size: 13px; font-weight: 600; color: #2D5A27; }
  .win-title { font-size: 11px; color: #6b8f66; }
  .win-cta { font-size: 12px; color: #666; padding-left: 32px; }

  .tab-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 8px 0 24px; z-index: 50; }
  .tab-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 8px; }
  .tab-icon { font-size: 20px; line-height: 1; transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
  .tab-icon.inactive { filter: grayscale(0.8); opacity: 0.5; }
  .tab-icon.active { transform: scale(1.15); }
  .tab-label { font-size: 10px; letter-spacing: 0.3px; transition: all 0.2s; }
  .tab-label.active { font-weight: 700; color: #2D5A27; }
  .tab-label.inactive { font-weight: 500; color: #999; }
  .tab-dot { width: 4px; height: 4px; border-radius: 50%; background: #2D5A27; margin-top: -1px; animation: fadeIn 0.3s ease; }

  .sheet-overlay { position: absolute; inset: 0; z-index: 100; background: rgba(0,0,0,0.35); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); animation: fadeIn 0.25s ease; }
  .sheet-panel { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; max-height: 70%; overflow-y: auto; animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1); box-shadow: 0 -8px 40px rgba(0,0,0,0.12); }
  .sheet-handle { display: flex; justify-content: center; padding: 12px 0 4px; }
  .sheet-handle-bar { width: 36px; height: 4px; border-radius: 2px; background: #d1d1d1; }
  .sheet-body { padding: 8px 22px 28px; }
  .sheet-accent { width: 100%; height: 4px; border-radius: 2px; margin-bottom: 16px; }
  .sheet-title { font-family: 'Outfit', sans-serif; font-size: 19px; font-weight: 600; margin-bottom: 4px; }
  .sheet-meta { color: #888; font-size: 13px; margin-bottom: 16px; }
  .sheet-text { font-size: 13px; line-height: 1.7; color: #444; white-space: pre-line; }
  .sheet-warn { margin-top: 16px; padding: 12px 14px; background: #FFF8F0; border-radius: 10px; font-size: 12px; color: #B5651D; }
  .sheet-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; padding: 4px 10px; border-radius: 6px; margin-bottom: 16px; }
  .sheet-emoji { font-size: 26px; margin-bottom: 8px; }

  /* Footer below phone on desktop */
  .page-footer { text-align: center; margin-top: 24px; font-size: 12px; color: #444; }
  .page-footer a { color: var(--brand-blue); text-decoration: none; }
  @media (max-width: 480px) { .page-footer { display: none; } }
</style>
</head>
<body>

<div class="page-wrapper">
  <!-- Desktop header above the phone -->
  <div class="page-header">
    <div class="badge">Merch Ops Execution</div>
    <h1>☀️ Matt's Daily Update</h1>
    <p>Thursday, May 21, 2026 · Sourced from Slack, Outlook & Confluence</p>
  </div>

  <!-- Phone frame -->
  <div class="phone-frame">
    <div id="root"></div>
  </div>

  <div class="page-footer">
    Built by Merch Ops · Powered by Claude
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script>
const e = React.createElement;
const { useState, useEffect, useRef } = React;

const TABS = [
  { id:"today", icon:"\u{1F4C5}", label:"Today" },
  { id:"actions", icon:"\u{1F3AF}", label:"Actions" },
  { id:"team", icon:"\u{1F465}", label:"Team" },
  { id:"alerts", icon:"\u26A0\uFE0F", label:"Alerts" },
  { id:"wins", icon:"\u{1F31F}", label:"Wins" },
];

const CALENDAR = [
  { time:"10:00", title:"NSL Working Group", tag:"Company", tagColor:"#7C5CBF", tagBg:"#F3EFFB", overlap:true },
  { time:"10:00", title:"Homepage Sync", tag:"Team", tagColor:"#2B5EA7", tagBg:"#EBF2FC", overlap:true },
  { time:"10:30", title:"Merch Ops \u00D7 Canada", tag:"Team", tagColor:"#2B5EA7", tagBg:"#EBF2FC" },
  { time:"11:00", title:"Peakon Manager Training", tag:"Manager", tagColor:"#7C5CBF", tagBg:"#F3EFFB" },
  { time:"1:00", title:"SBK360 Bi-weekly", tag:"SBK-wide", tagColor:"#7C5CBF", tagBg:"#F3EFFB" },
  { time:"1:30", title:"Matt & Will 1:1", tag:"Your 1:1", tagColor:"#2D5A27", tagBg:"#E8F3E6" },
  { time:"2:30", title:"Matt & Aashini 1:1", tag:"Your 1:1", tagColor:"#2D5A27", tagBg:"#E8F3E6" },
];

const ACTIONS = [
  { id:1, emoji:"\u2705", title:"GAA Betting / NJ Compliance", subtitle:"Resolved", color:"#2D5A27", bg:"#E8F3E6",
    detail:"NJ does not approve GAA. Approved states: AZ, CO, CT, IL, MD, MI, NC, PA, VA, VT, WY, ON. Conor + Zack Jenis updated via group DM. Patrick Aherne\u2019s team is working to get games live in approved states. James Durkan confirmed compliance filtering is in place.\n\nConsider documenting the approvals list somewhere accessible so the team has a reference for future queries." },
  { id:2, emoji:"\u{1F534}", title:"Racing Ops Shift Authorize", subtitle:"Reply needed today", color:"#C0392B", bg:"#FDECEA",
    detail:"Melissa Marso replied yesterday evening flagging that the hours you submitted don\u2019t match what she sees in DayForce. You originally sent this to Harry Catalani and Melissa on May 20.\n\nAction: Check Melissa\u2019s email, reconcile the discrepancy, and send a quick reply today." },
  { id:3, emoji:"\u{1F4CA}", title:"April SBK \u2192 CAS Performance", subtitle:"Review before 1pm", color:"#D4722A", bg:"#FFF3EB",
    detail:"Michael Castor forwarded the April SBK-to-CAS performance report this morning (originally from Sinan Kocabas). The email includes attachments.\n\nReview the data ahead of the SBK360 Bi-weekly at 1:00 PM \u2014 it\u2019ll be useful context for the meeting discussion." },
  { id:4, emoji:"\u{1F91D}", title:"WC Merchandizing Sync", subtitle:"Room confirmed", color:"#2B5EA7", bg:"#EBF2FC",
    detail:"Room booking has been accepted. Ensure you\u2019re prepped for this recurring sync with Rebecca Kilcoyne. Check if there are any new agenda items or updates to bring." },
];

const TEAM = [
  { name:"Aashini Desai", emoji:"\u{1F7E2}", role:"Canada Alignment Lead", summary:"Leading Merch Ops \u00D7 Canada call at 10:30 AM.",
    detail:"Aashini confirmed she\u2019s happy to lead the Canada alignment effort. She has the call at 10:30 AM with Mason, Niall, Bradley, and Chantel.\n\nUse your 2:30 PM 1:1 to debrief on how it went, discuss any blockers, and agree on next steps. This is a good one to delegate fully \u2014 she\u2019s got it." },
  { name:"Will Eklund", emoji:"\u{1F535}", role:"1:1 at 1:30 PM", summary:"Sync on Retail Flash, SBK360, CAS performance.",
    detail:"Your 1:30 PM 1:1 is a good time to cover:\n\n\u2022 SBK Retail Daily Flash \u2014 Clarissa forwarded to both of you\n\u2022 SBK360 Bi-weekly takeaways from the 1:00 PM meeting\n\u2022 April CAS performance update from Michael Castor" },
  { name:"Shane McCabe", emoji:"\u2B50", role:"Betting Plans", summary:"Excellent initiative chasing GAA compliance today.",
    detail:"Shane proactively reached out to Compliance when the GAA/NJ question came in. He got a clear answer from Shaquille Khan\u2019s team quickly, and has also requested access to the full sport-by-state approvals breakdown sheet.\n\nThis kind of ownership saves everyone time and builds stronger cross-functional relationships." },
  { name:"Mahima Munjal", emoji:"\u2B50", role:"Homepage Sync", summary:"Provided initial state availability data for GAA.",
    detail:"Mahima quickly identified the states where GAA was available which gave the team a solid starting point for the compliance chase.\n\nShe\u2019s on the Homepage Sync at 10:00 AM today." },
];

const ALERTS = [
  { emoji:"\u{1F5D3}\uFE0F", title:"Mid-Year Conversations",
    detail:"Manager session TODAY at 11 AM (Peakon Dashboard + Insights). Employee-facing session TOMORROW at 10 AM \u2014 remind your directs to attend.\n\nStart scheduling your 1:1 mid-year check-ins with each team member." },
  { emoji:"\u{1F3A4}", title:"SBK TBM Show & Tell \u2014 Tomorrow 10 AM",
    detail:"Monthly Show & Tell organized by Purity Gitau. Check if your team has anything to present, or if you need to prep talking points." },
  { emoji:"\u{1F6E2}\uFE0F", title:"Databricks Migration \u2014 Tomorrow EOD",
    detail:"Mickey Shaffer announced: Serverless SQL warehouses converting to PRO SQL warehouses across data-eng-dev & analytics workspaces starting tomorrow (5/22) EOD.\n\nFlag to anyone running analytics queries \u2014 possible brief disruptions." },
  { emoji:"\u{1F1E8}\u{1F1E6}", title:"Canada Alignment \u2014 In Progress",
    detail:"Actively in motion with Aashini leading. You\u2019ve offered support.\n\nKeep tabs via #merchops_execution_lt and your 2:30 PM 1:1 with Aashini." },
];

const WINS = [
  { emoji:"\u{1F3C6}", name:"Shane McCabe", title:"Ownership & Initiative",
    detail:"When the GAA/NJ question landed, Shane didn\u2019t wait \u2014 he proactively contacted Compliance, got a clear documented answer within hours, and is working to secure the full sport-by-state approvals sheet. That kind of initiative saves the entire team time." },
  { emoji:"\u{1F4AA}", name:"Aashini Desai", title:"Stepping Up on Canada",
    detail:"Volunteered to lead the Canada alignment work independently without needing to be asked twice. Strong example of the team taking ownership of cross-market coordination." },
  { emoji:"\u{1F91D}", name:"Cross-Functional Win", title:"GAA Investigation",
    detail:"The team worked across Merch Ops (Shane, Mahima), Compliance (James Durkan, Shaquille Khan), and Trading (Patrick Aherne) to get a fully documented, clear answer in under 2 hours.\n\nThat\u2019s the kind of cross-functional responsiveness that keeps the operation sharp." },
];

function App() {
  const [tab, setTab] = useState("today");
  const [sheet, setSheet] = useState(null);
  const [time, setTime] = useState(new Date());
  const contentRef = useRef(null);

  useEffect(() => { const id = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(id); }, []);

  const hour = time.getHours();
  const greeting = hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : "Good evening";
  const timeStr = time.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });

  function switchTab(id) { setTab(id); setSheet(null); if (contentRef.current) contentRef.current.scrollTop = 0; }

  function renderToday() {
    return e("div", null,
      e("div", { className:"stats" },
        [{n:"7",l:"Meetings",c:"#2B5EA7",bg:"#EBF2FC"},{n:"4",l:"Actions",c:"#D4722A",bg:"#FFF3EB"},{n:"3",l:"Wins",c:"#2D5A27",bg:"#E8F3E6"}].map(s =>
          e("div",{key:s.l,className:"stat",style:{background:s.bg}},
            e("div",{className:"stat-n",style:{color:s.c}},s.n),
            e("div",{className:"stat-l",style:{color:s.c}},s.l)))
      ),
      e("div",{className:"sec-label"},"Schedule"),
      CALENDAR.map((ev,i) =>
        e("div",{key:i,className:"cal-item",onClick:()=>setSheet({color:ev.tagColor,content:e("div",null,
          e("div",{className:"sheet-title"},ev.title),
          e("div",{className:"sheet-meta"},ev.time+" EDT"),
          e("div",{className:"sheet-tag",style:{background:ev.tagBg,color:ev.tagColor}},ev.tag),
          ev.overlap?e("div",{className:"sheet-warn"},"\u23F0 This overlaps with another meeting. Prioritise or split attendance."):null
        )})},
          e("div",{className:"cal-time"},ev.time),
          e("div",{className:"cal-title"},ev.title),
          e("div",{className:"tag",style:{background:ev.tagBg,color:ev.tagColor}},ev.tag),
          e("div",{className:"chevron"},"\u203A")))
    );
  }

  function renderActions() {
    return e("div",null,
      e("div",{className:"sec-label"},"Open items"),
      ACTIONS.map(a=>
        e("div",{key:a.id,className:"action-card",style:{borderLeft:"4px solid "+a.color},
          onClick:()=>setSheet({color:a.color,content:e("div",null,
            e("div",{className:"sheet-emoji"},a.emoji),
            e("div",{className:"sheet-title"},a.title),
            e("div",{className:"sheet-tag",style:{background:a.bg,color:a.color}},a.subtitle),
            e("p",{className:"sheet-text"},a.detail))})},
          e("div",{className:"action-icon",style:{background:a.bg}},a.emoji),
          e("div",{className:"action-body"},
            e("div",{className:"action-title"},a.title),
            e("div",{className:"action-sub",style:{color:a.color}},a.subtitle)),
          e("div",{className:"chevron"},"\u203A")))
    );
  }

  function renderTeam() {
    return e("div",null,
      e("div",{className:"sec-label"},"Focus areas"),
      TEAM.map((t,i)=>
        e("div",{key:i,className:"team-card",
          onClick:()=>setSheet({color:"#2D5A27",content:e("div",null,
            e("div",{className:"sheet-emoji"},t.emoji),
            e("div",{className:"sheet-title"},t.name),
            e("div",{className:"sheet-meta"},t.role),
            e("p",{className:"sheet-text"},t.detail))})},
          e("div",{className:"team-avi"},t.emoji),
          e("div",{style:{flex:1}},
            e("div",{className:"team-name"},t.name),
            e("div",{className:"team-sum"},t.summary)),
          e("div",{className:"chevron"},"\u203A")))
    );
  }

  function renderAlerts() {
    return e("div",null,
      e("div",{className:"sec-label"},"Watch-outs"),
      ALERTS.map((a,i)=>
        e("div",{key:i,className:"alert-card",
          onClick:()=>setSheet({color:"#D4722A",content:e("div",null,
            e("div",{className:"sheet-emoji"},a.emoji),
            e("div",{className:"sheet-title"},a.title),
            e("p",{className:"sheet-text"},a.detail))})},
          e("div",{className:"alert-emoji"},a.emoji),
          e("div",{className:"alert-title"},a.title),
          e("div",{className:"chevron"},"\u203A")))
    );
  }

  function renderWins() {
    return e("div",null,
      e("div",{className:"sec-label"},"Share with the wider Merch Ops team"),
      WINS.map((w,i)=>
        e("div",{key:i,className:"win-card",
          onClick:()=>setSheet({color:"#2D5A27",content:e("div",null,
            e("div",{style:{fontSize:30,marginBottom:8}},w.emoji),
            e("div",{className:"sheet-title",style:{color:"#2D5A27"}},w.name),
            e("div",{className:"sheet-meta"},w.title),
            e("p",{className:"sheet-text"},w.detail))})},
          e("div",{className:"win-head"},
            e("span",{className:"win-emoji"},w.emoji),
            e("div",null,
              e("div",{className:"win-name"},w.name),
              e("div",{className:"win-title"},w.title))),
          e("div",{className:"win-cta"},"Tap to read the full callout \u203A")))
    );
  }

  const views = {today:renderToday,actions:renderActions,team:renderTeam,alerts:renderAlerts,wins:renderWins};

  return e("div",{className:"shell"},
    e("div",{className:"status-bar"},
      e("span",null,timeStr),
      e("div",{style:{display:"flex",gap:6,alignItems:"center"}},
        e("span",{style:{fontSize:11}},"5G"),
        e("div",{className:"batt"},e("div",{className:"batt-fill"})))),

    e("div",{className:"hdr"},
      e("div",{className:"hdr-greet"},greeting+", Matt"),
      e("div",{className:"hdr-title"},"Daily Update \u2600\uFE0F"),
      e("div",{className:"hdr-sub"},"Thu, May 21, 2026 \u00B7 Slack, Outlook & Confluence")),

    e("div",{className:"content",ref:contentRef},views[tab]()),

    e("div",{className:"tab-bar"},
      TABS.map(t=>
        e("button",{key:t.id,className:"tab-btn",onClick:()=>switchTab(t.id)},
          e("div",{className:"tab-icon "+(tab===t.id?"active":"inactive")},t.icon),
          e("div",{className:"tab-label "+(tab===t.id?"active":"inactive")},t.label),
          tab===t.id?e("div",{className:"tab-dot"}):null))),

    sheet?e("div",{className:"sheet-overlay",onClick:()=>setSheet(null)},
      e("div",{className:"sheet-panel",onClick:ev=>ev.stopPropagation()},
        e("div",{className:"sheet-handle"},e("div",{className:"sheet-handle-bar"})),
        e("div",{className:"sheet-body"},
          sheet.color?e("div",{className:"sheet-accent",style:{background:sheet.color}}):null,
          sheet.content))):null
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
